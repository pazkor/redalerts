<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>מרכז פיקוד – סבירות התראה</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=VT323&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; margin:0; padding:0; }
    body {
      font-family: 'VT323', monospace;
      background: #0a0e14;
      color: #00ff41;
      direction: rtl;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    #alert-banner {
      display: none;
      background: #8b0000;
      color: #ffdddd;
      padding: 18px 24px;
      font-size: clamp(1.35rem, 5.5vw, 1.9rem);
      font-weight: bold;
      text-align: center;
      text-shadow: 0 0 10px #ff0000;
      box-shadow: 0 0 30px rgba(255,0,0,0.7);
      position: sticky;
      top: 0;
      z-index: 9999;
      animation: flash 1.1s infinite alternate;
    }
    @keyframes flash { from {opacity:0.88;} to {opacity:1;} }

    #clock-bar {
      background: #111;
      padding: 10px 16px;
      font-size: 1.05rem;
      color: #88ffaa;
      text-align: center;
      border-bottom: 1px solid #333;
    }

    #map { flex: 1; min-height: 340px; background: #000; }

    .container { max-width: 1400px; margin: 0 auto; padding: 0 16px; }

    h1 {
      text-align: center;
      color: #ff4444;
      margin: 12px 0 8px;
      font-size: clamp(1.8rem, 6.5vw, 2.5rem);
      text-shadow: 0 0 12px #ff0000;
    }

    #prob-box {
      background: #0f1419;
      border: 2px solid #00ff41;
      border-radius: 8px;
      padding: 18px 14px;
      text-align: center;
      margin: 16px 0 24px;
      box-shadow: 0 0 25px rgba(0,255,65,0.3);
    }

    #prob-box.high {
      border-color: #ff4444;
      box-shadow: 0 0 35px rgba(255,68,68,0.6);
    }

    #percentage {
      font-size: clamp(5rem, 17vw, 8rem);
      font-weight: 900;
      margin: 0;
      line-height: 0.85;
      color: #00ff41;
    }

    #bar {
      height: 36px;
      background: #111;
      border: 1px solid #444;
      border-radius: 6px;
      overflow: hidden;
      margin: 16px 0;
    }

    #fill {
      height: 100%;
      background: linear-gradient(90deg, #00ff41, #ffaa00, #ff4444);
      transition: width 1.2s ease-out;
    }

    #zone-name {
      font-size: clamp(1.7rem, 5.5vw, 2.3rem);
      margin-bottom: 12px;
      color: #00ff88;
    }

    #explain {
      font-size: clamp(1rem, 3.6vw, 1.2rem);
      color: #88ffaa;
    }

    #status {
      text-align: center;
      font-size: clamp(1.05rem, 3.8vw, 1.25rem);
      margin: 16px 0 24px;
      padding: 10px 16px;
      border-radius: 8px;
      background: #111;
      border: 1px solid #333;
      color: #00cc66;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
    }

    .pulse-dot {
      width: 12px;
      height: 12px;
      background: #00ff41;
      border-radius: 50%;
      box-shadow: 0 0 12px #00ff41, 0 0 24px #00ff41;
      animation: pulse-dot 2s infinite;
    }

    #status.alert-active .pulse-dot {
      background: #ff4444;
      box-shadow: 0 0 16px #ff4444, 0 0 32px #ff0000;
      animation: pulse-dot-alert 1.2s infinite;
    }

    @keyframes pulse-dot {
      0%, 100% { transform: scale(1); opacity: 0.7; }
      50% { transform: scale(1.4); opacity: 1; }
    }

    @keyframes pulse-dot-alert {
      0%, 100% { transform: scale(1); opacity: 0.8; }
      50% { transform: scale(1.6); opacity: 1; }
    }

    .stats-section {
      padding: 0 16px 32px;
      background: #0d1117;
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
      gap: 16px;
    }

    .stat {
      padding: 16px;
      background: #111;
      border: 1px solid #333;
      border-radius: 8px;
      text-align: center;
    }

    .stat-label {
      font-size: 0.95rem;
      color: #88ffaa;
      margin-bottom: 6px;
    }

    .stat-value {
      font-size: 1.8rem;
      font-weight: bold;
      color: #ffcc00;
    }

    @media (max-width: 768px) {
      #map { height: 48vh; min-height: 340px; }
      h1 { margin: 12px 0 8px; }
      #prob-box { padding: 16px 12px; margin: 12px 0 20px; }
      .stats-section { padding: 0 12px 32px; gap: 12px; }
    }
  </style>
</head>
<body>

<!-- באנר התרעות -->
<div id="alert-banner">
  🚨 <span id="banner-text">התרעות פעילות – סכנה מיידית!</span>
  <div id="banner-zones" style="font-size:1rem; margin-top:10px;"></div>
</div>

<!-- שעון + יום למלחמה -->
<div id="clock-bar">
  <span id="clock"></span>
</div>

<div class="container">
  <h1>מרכז פיקוד – מה הסיכוי להתראה?</h1>
</div>

<div id="map"></div>

<div class="container">
  <div id="prob-box">
    <div id="zone-name">לחץ על אזור במפה</div>
    <div id="percentage">— %</div>
    <div id="bar"><div id="fill" style="width:0%"></div></div>
    <div id="explain">סבירות משוערת להתרעה **היום** (מבוסס על 4 הימים האחרונים )</div>
  </div>

  <div id="status">
    <span class="pulse-dot"></span>
    מערכת פעילה • ממתינה לנתונים...
  </div>
</div>

<div class="stats-section">
  <div class="stat">
    <div class="stat-label">סה"כ התרעות ב-4 הימים האחרונים</div>
    <div class="stat-value" id="total4">—</div>
  </div>
  <div class="stat">
    <div class="stat-label">התרעות פעילות כרגע</div>
    <div class="stat-value" id="live-count">0</div>
  </div>
  <div class="stat">
    <div class="stat-label">האזורים הכי פעילים</div>
    <div id="top-zones" style="font-size:1.05rem; line-height:1.6; margin-top:10px; color:#ffcc00;"></div>
  </div>
</div>

<script>
// ====================== נתוני בסיס ======================
const citiesBase = [
  { name: "אזור תל אביב", lat: 32.0853, lon: 34.7818, alerts4: 3 },
  { name: "אזור ירושלים", lat: 31.7683, lon: 35.2137, alerts4: 1 },
  { name: "אזור חיפה", lat: 32.7940, lon: 34.9896, alerts4: 1 },
  { name: "אזור ראשון לציון", lat: 31.9730, lon: 34.7925, alerts4: 2 },
  { name: "אזור פתח תקווה", lat: 32.0840, lon: 34.8878, alerts4: 2 },
  { name: "אזור אשדוד", lat: 31.8044, lon: 34.6553, alerts4: 2 },
  { name: "אזור נתניה", lat: 32.3215, lon: 34.8532, alerts4: 2 },
  { name: "אזור באר שבע", lat: 31.2520, lon: 34.7915, alerts4: 1 },
  { name: "אזור מודיעין", lat: 31.8939, lon: 35.0150, alerts4: 3 },
  { name: "אזור קריית שמונה", lat: 33.2079, lon: 35.5698, alerts4: 15 },
  { name: "אזור מטולה", lat: 33.2792, lon: 35.5773, alerts4: 10 },
  { name: "אזור שדרות", lat: 31.5293, lon: 34.5965, alerts4: 2 },
  { name: "אזור נהריה", lat: 33.0085, lon: 35.0980, alerts4: 3 },
  { name: "אזור עכו", lat: 32.9278, lon: 35.0780, alerts4: 2 },
  { name: "אזור אילת", lat: 29.5577, lon: 34.9519, alerts4: 0 },
  { name: "אזור ירוחם", lat: 30.9875, lon: 34.9281, alerts4: 0 },
  { name: "אזור ים המלח", lat: 31.35, lon: 35.45, alerts4: 0 },
  { name: "אזור הערבה", lat: 30.65, lon: 35.20, alerts4: 0 },
  { name: "אזור כנרת / טבריה", lat: 32.795, lon: 35.53, alerts4: 5 },
  { name: "אזור גליל תחתון", lat: 32.92, lon: 35.35, alerts4: 6 },
  { name: "אזור גליל עליון", lat: 33.00, lon: 35.45, alerts4: 11 },
  { name: "אזור בית שאן", lat: 32.50, lon: 35.50, alerts4: 4 },
  { name: "אזור רמת הגולן", lat: 33.10, lon: 35.70, alerts4: 6 },
  { name: "אזור צפת / מירון", lat: 32.968, lon: 35.492, alerts4: 7 },
  { name: "אזור קצרין", lat: 32.993, lon: 35.689, alerts4: 5 },
  { name: "אזור זכרון יעקב", lat: 32.57, lon: 34.95, alerts4: 1 },
  { name: "אזור עפולה", lat: 32.61, lon: 35.29, alerts4: 2 },
  { name: "אזור הרצליה", lat: 32.1658, lon: 34.8367, alerts4: 2 },
  { name: "אזור רעננה", lat: 32.1848, lon: 34.8713, alerts4: 2 },
  { name: "אזור בת ים", lat: 32.0132, lon: 34.7480, alerts4: 3 },
  { name: "אזור רמת גן", lat: 32.0684, lon: 34.8248, alerts4: 3 },
  { name: "אזור חולון", lat: 32.0158, lon: 34.7874, alerts4: 3 },
  { name: "אזור בני ברק", lat: 32.0849, lon: 34.8352, alerts4: 3 },
  { name: "אזור חדרה", lat: 32.434, lon: 34.919, alerts4: 2 },
  { name: "אזור חריש", lat: 32.463, lon: 35.047, alerts4: 1 },
  { name: "אזור גדרה", lat: 31.812, lon: 34.779, alerts4: 2 },
  { name: "אזור קריית גת", lat: 31.611, lon: 34.764, alerts4: 2 },
  { name: "אזור בית שמש", lat: 31.747, lon: 34.988, alerts4: 2 },
  { name: "אזור טמרה", lat: 32.853, lon: 35.199, alerts4: 3 }
];

// ====================== שחיקה + תנודות + תגובה לאזעקה ======================
const warStart = new Date(2026, 1, 28); // 28/2/2026
let cityStates = {}; // localStorage + מצב זמני

// טען/אתחל מצב
citiesBase.forEach(city => {
  const key = city.name;
  if (!localStorage.getItem(key)) {
    cityStates[key] = {
      baseAlerts: city.alerts4,
      lastAlertTime: null,
      postAlertUntil: 0,
      noise: 0
    };
  } else {
    cityStates[key] = JSON.parse(localStorage.getItem(key));
  }
});

function saveStates() {
  Object.keys(cityStates).forEach(key => {
    localStorage.setItem(key, JSON.stringify(cityStates[key]));
  });
}

// חישוב סבירות דינמי (שחיקה + תגובה לאזעקה + תנודה)
function getProb(cityName) {
  const state = cityStates[cityName];
  const now = Date.now();

  // שחיקה יומית 3%
  const daysSinceWar = Math.floor((now - warStart) / (1000*60*60*24));
  const decay = Math.pow(0.97, daysSinceWar);

  // תגובה לאזעקה (ירידה 30% למשך שעה)
  let postAlertFactor = 1;
  if (state.postAlertUntil > now) {
    postAlertFactor = 0.7;
  }

  // תנודה קלה (+/- 7%)
  const hourFactor = (new Date().getHours() >= 22 || new Date().getHours() <= 6) ? 0.85 : 1; // לילה נמוך יותר
  const noise = state.noise || (Math.random() * 14 - 7);

  let raw = (state.baseAlerts / 4) * 100;
  if (cityName.includes("אילת") || cityName.includes("ערבה")) raw = Math.max(raw, 9);

  let prob = raw * decay * postAlertFactor * hourFactor + noise;
  prob = Math.max(1, Math.min(99, Math.round(prob)));

  return prob;
}

// עדכון בועות
let markers = {};
const map = L.map('map', { minZoom: 7.5, maxZoom: 14, maxBounds: L.latLngBounds(L.latLng(33.40, 34.1), L.latLng(29.3, 35.9)), maxBoundsViscosity: 0.95 })
  .fitBounds(L.latLngBounds(L.latLng(33.40, 34.1), L.latLng(29.3, 35.9)));

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', { attribution: '© OpenStreetMap' }).addTo(map);

citiesBase.forEach(city => {
  const marker = L.circleMarker([city.lat, city.lon], { radius: 11, color: '#ffffff', weight: 3 }).addTo(map);
  markers[city.name] = marker;

  marker.city = city;
  marker.on('click', () => {
    const prob = getProb(city.name);
    document.getElementById('zone-name').textContent = city.name;
    document.getElementById('percentage').textContent = prob + "%";
    document.getElementById('fill').style.width = prob + "%";
    document.getElementById('prob-box').classList.toggle('high', prob > 75);
  });
});

// עדכון בועות כל 30 שניות (fluctuations)
function updateAllMarkers() {
  citiesBase.forEach(city => {
    const prob = getProb(city.name);
    let color = '#10b981';
    if (prob > 75) color = '#c53030';
    else if (prob > 50) color = '#f56565';
    else if (prob > 20) color = '#f6ad55';

    const marker = markers[city.name];
    marker.setStyle({ fillColor: color, fillOpacity: prob > 75 ? 0.95 : 0.88 });
    marker.bindTooltip(`<b>${city.name}</b><br>סבירות: ${prob}%`, {permanent: false, direction: 'top'});
  });
}

// ====================== התרעות + תגובה מיידית ======================
const PROXY = 'https://api.allorigins.win/raw?url=';
const OREF_URL = 'https://www.oref.org.il/WarningMessages/alert/alerts.json';

async function checkAlerts() {
  try {
    const res = await fetch(PROXY + encodeURIComponent(OREF_URL));
    const text = await res.text();
    const data = JSON.parse(text.replace(/^\uFEFF/, ''));

    const banner = document.getElementById('alert-banner');
    const status = document.getElementById('status');
    const now = Date.now();

    if (Array.isArray(data) && data.length > 0) {
      banner.style.display = 'block';
      document.getElementById('banner-text').textContent = `התרעות פעילות – סכנה מיידית (${data.length})`;
      document.getElementById('banner-zones').innerHTML = data.slice(0,10).join(' • ');

      // תגובה מיידית: ירידה של ~30% בכל אזור שהופיע באזעקה
      data.forEach(zone => {
        citiesBase.forEach(city => {
          if (zone.includes(city.name.replace("אזור ", ""))) {
            cityStates[city.name].postAlertUntil = now + 60*60*1000; // שעה
            cityStates[city.name].noise = -25; // ירידה חדה
          }
        });
      });

      status.classList.add('alert-active');
      status.innerHTML = `<span class="pulse-dot"></span> מערכת פעילה • התרעה פעילה!`;
    } else {
      banner.style.display = 'none';
      status.classList.remove('alert-active');
      status.innerHTML = `<span class="pulse-dot"></span> מערכת פעילה • ממתינה לנתונים...`;
    }

    saveStates();
    updateAllMarkers();
  } catch(e) {}
}

// תנודה קלה + עדכון כל 30 שניות
setInterval(() => {
  citiesBase.forEach(city => {
    cityStates[city.name].noise = (Math.random() * 14 - 7);
  });
  updateAllMarkers();
}, 30000);

// התרעות + רענון
checkAlerts();
setInterval(checkAlerts, 5000);

// שעון + יום למלחמה
function updateClock() {
  const now = new Date();
  const gregorian = now.toLocaleDateString('he-IL', { weekday: 'long', day: 'numeric', month: 'long' });
  const timeStr = now.toLocaleTimeString('he-IL', { hour: '2-digit', minute: '2-digit' });

  const daysSinceWar = Math.floor((now - warStart) / (1000*60*60*24)) + 1;

  document.getElementById('clock').innerHTML = `${gregorian} • ${timeStr} • יום ${daysSinceWar} למלחמה`;
}
setInterval(updateClock, 1000);
updateClock();

// רענון מלא כל 3 דקות (גיבוי)
setTimeout(() => location.reload(), 180000);

// התחלה
updateAllMarkers();
</script>
</body>
</html>
