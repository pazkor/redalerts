<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>מרכז פיקוד – סבירות התראה</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=VT323&display=swap" rel="stylesheet">
  <style>
    /* כל ה-CSS שלך נשאר בדיוק אותו דבר */
    * { box-sizing: border-box; margin:0; padding:0; }
    body { font-family: 'VT323', monospace; background: #0a0e14; color: #00ff41; direction: rtl; min-height: 100vh; display: flex; flex-direction: column; }
    #alert-banner { display: none; background: #8b0000; color: #ffdddd; padding: 18px 24px; font-size: clamp(1.35rem, 5.5vw, 1.9rem); font-weight: bold; text-align: center; text-shadow: 0 0 10px #ff0000; box-shadow: 0 0 30px rgba(255,0,0,0.7); position: sticky; top: 0; z-index: 9999; animation: flash 1.1s infinite alternate; }
    @keyframes flash { from {opacity:0.88;} to {opacity:1;} }
    #clock-bar { background: #111; padding: 10px 16px; font-size: 1.05rem; color: #88ffaa; text-align: center; border-bottom: 1px solid #333; }
    #map { flex: 1; min-height: 340px; background: #000; }
    .container { max-width: 1400px; margin: 0 auto; padding: 0 16px; }
    h1 { text-align: center; color: #ff4444; margin: 12px 0 8px; font-size: clamp(1.8rem, 6.5vw, 2.5rem); text-shadow: 0 0 12px #ff0000; }
    #prob-box { background: #0f1419; border: 2px solid #00ff41; border-radius: 8px; padding: 18px 14px; text-align: center; margin: 16px 0 24px; box-shadow: 0 0 25px rgba(0,255,65,0.3); }
    #prob-box.high { border-color: #ff4444; box-shadow: 0 0 35px rgba(255,68,68,0.6); }
    #percentage { font-size: clamp(5rem, 17vw, 8rem); font-weight: 900; margin: 0; line-height: 0.85; color: #00ff41; }
    #bar { height: 36px; background: #111; border: 1px solid #444; border-radius: 6px; overflow: hidden; margin: 16px 0; }
    #fill { height: 100%; background: linear-gradient(90deg, #00ff41, #ffaa00, #ff4444); transition: width 1.2s ease-out; }
    #zone-name { font-size: clamp(1.7rem, 5.5vw, 2.3rem); margin-bottom: 12px; color: #00ff88; }
    #explain { font-size: clamp(1rem, 3.6vw, 1.2rem); color: #88ffaa; }
    #status { text-align: center; font-size: clamp(1.05rem, 3.8vw, 1.25rem); margin: 16px 0 24px; padding: 10px 16px; border-radius: 8px; background: #111; border: 1px solid #333; color: #00cc66; display: flex; align-items: center; justify-content: center; gap: 12px; }
    .pulse-dot { width: 12px; height: 12px; background: #00ff41; border-radius: 50%; box-shadow: 0 0 12px #00ff41, 0 0 24px #00ff41; animation: pulse-dot 2s infinite; }
    #status.alert-active .pulse-dot { background: #ff4444; box-shadow: 0 0 16px #ff4444, 0 0 32px #ff0000; animation: pulse-dot-alert 1.2s infinite; }
    @keyframes pulse-dot { 0%,100% { transform: scale(1); opacity: 0.7; } 50% { transform: scale(1.4); opacity: 1; } }
    @keyframes pulse-dot-alert { 0%,100% { transform: scale(1); opacity: 0.8; } 50% { transform: scale(1.6); opacity: 1; } }
    .stats-section { padding: 0 16px 32px; background: #0d1117; display: grid; grid-template-columns: repeat(auto-fit, minmax(260px, 1fr)); gap: 16px; }
    .stat { padding: 16px; background: #111; border: 1px solid #333; border-radius: 8px; text-align: center; }
    .stat-label { font-size: 0.95rem; color: #88ffaa; margin-bottom: 6px; }
    .stat-value { font-size: 1.8rem; font-weight: bold; color: #ffcc00; }
    #last-update { font-size: 0.9rem; color: #666; margin-top: 8px; }
  </style>
</head>
<body>
<div id="alert-banner">🚨 <span id="banner-text">התרעות פעילות – סכנה מיידית!</span><div id="banner-zones" style="font-size:1rem;margin-top:10px;"></div></div>
<div id="clock-bar"><span id="clock"></span></div>
<div class="container"><h1>מרכז פיקוד – מה הסיכוי להתראה?</h1></div>
<div id="map"></div>
<div class="container">
  <div id="prob-box">
    <div id="zone-name">לחץ על אזור במפה</div>
    <div id="percentage">— %</div>
    <div id="bar"><div id="fill" style="width:0%"></div></div>
    <div id="explain">סבירות משוערת להתרעה **היום** (מבוסס על 3 ימים אחורה)</div>
  </div>
  <div id="status"><span class="pulse-dot"></span> מערכת פעילה • טוען נתונים...</div>
</div>
<div class="stats-section">
  <div class="stat"><div class="stat-label">סה"כ התרעות ב-3 הימים האחרונים</div><div class="stat-value" id="total4">0</div></div>
  <div class="stat"><div class="stat-label">התרעות פעילות כרגע</div><div class="stat-value" id="live-count">0</div></div>
  <div class="stat"><div class="stat-label">האזורים הכי פעילים</div><div id="top-zones" style="font-size:1.05rem;line-height:1.6;margin-top:10px;color:#ffcc00;">—</div></div>
</div>

<script>
// ====================== PROXIES + FETCH חכם ======================
const PROXIES = [
  'https://api.allorigins.win/raw?url=',
  'https://corsproxy.io/?',
  'https://api.codetabs.com/v1/proxy?quest=',
  'https://thingproxy.freeboard.io/fetch/'
];

async function fetchWithFallback(url) {
  for (let proxy of PROXIES) {
    try {
      const fullUrl = proxy + encodeURIComponent(url + (url.includes('?') ? '&' : '?') + '_t=' + Date.now());
      const res = await fetch(fullUrl);
      if (res.ok) {
        let text = await res.text();
        text = text.replace(/^\uFEFF/, '').trim();
        return { success: true, text, proxyUsed: proxy };
      }
    } catch(e) {}
  }
  return { success: false };
}

// ====================== ערים + מיפוי חזק ======================
const cities = [ /* העתק כאן את כל הרשימה המלאה שלך - רק alerts4: 0 */ 
  { name: "אזור תל אביב", lat: 32.0853, lon: 34.7818, alerts4: 0 },
  // ... כל 40 האזורים שלך (כמו בקוד המקורי)
  { name: "אזור טמרה", lat: 32.853, lon: 35.199, alerts4: 0 }
];

const nameMapping = {
  "תל אביב": "אזור תל אביב", "תל אביב - מרכז": "אזור תל אביב", "תל אביב - דרום": "אזור תל אביב",
  "ירושלים": "אזור ירושלים", "ירושלים - מרכז": "אזור ירושלים",
  "חיפה": "אזור חיפה", "חיפה - מרכז": "אזור חיפה",
  "ראשון לציון": "אזור ראשון לציון", "פתח תקווה": "אזור פתח תקווה",
  "אשדוד": "אזור אשדוד", "נתניה": "אזור נתניה", "באר שבע": "אזור באר שבע",
  "מודיעין": "אזור מודיעין", "קריית שמונה": "אזור קריית שמונה", "מטולה": "אזור מטולה",
  "שדרות": "אזור שדרות", "נהריה": "אזור נהריה", "עכו": "אזור עכו", "אילת": "אזור אילת",
  "גדרה": "אזור גדרה", "קריית גת": "אזור קריית גת", "בית שמש": "אזור בית שמש",
  "טמרה": "אזור טמרה", "בני ברק": "אזור בני ברק", "חולון": "אזור חולון",
  "רמת גן": "אזור רמת גן", "בת ים": "אזור בת ים", "הרצליה": "אזור הרצליה",
  // הוסף כאן עוד אם צריך
};

let cityStates = {};

// ====================== משיכת היסטוריה 3 ימים ======================
async function updateAlertsFromHistory() {
  document.getElementById('status').innerHTML = `<span class="pulse-dot"></span> מעדכן נתונים מ-3 ימים...`;
  
  const historyUrl = "https://www.oref.org.il/warningMessages/alert/History/AlertsHistory.json";
  const result = await fetchWithFallback(historyUrl);
  
  if (!result.success) {
    document.getElementById('status').innerHTML = `<span class="pulse-dot"></span> שגיאה בטעינת נתונים • נסה רענון`;
    return;
  }

  try {
    let data = JSON.parse(result.text);
    if (data.data) data = data.data;

    const threeDaysAgo = Date.now() - 3 * 86400000;
    const counts = {};

    data.forEach(item => {
      if (!item.alertDate) return;
      const alertTime = new Date(item.alertDate).getTime();
      if (alertTime < threeDaysAgo) return;

      const zones = Array.isArray(item.data) ? item.data : [item.data || item.title];
      zones.forEach(zone => {
        if (!zone) return;
        let clean = zone.toString().split(' - ')[0].trim();
        for (let [orefName, ourName] of Object.entries(nameMapping)) {
          if (clean.includes(orefName)) {
            counts[ourName] = (counts[ourName] || 0) + 1;
            break;
          }
        }
      });
    });

    cities.forEach(c => {
      c.alerts4 = counts[c.name] || 0;
      if (cityStates[c.name]) cityStates[c.name].base = c.alerts4;
    });

    console.log("✅ נתוני 3 ימים עודכנו בהצלחה");
  } catch(e) {
    console.error("שגיאת פרסור", e);
  }

  updateMarkers();
  document.getElementById('total4').textContent = cities.reduce((s,c)=>s + c.alerts4, 0);
  document.getElementById('status').innerHTML = `<span class="pulse-dot"></span> מערכת פעילה • עודכן ${new Date().toLocaleTimeString('he-IL')}`;
}

// ====================== שאר הקוד (getProb, map, checkAlerts וכו') ======================
// (העתק כאן את כל החלקים מהקוד הקודם שלך: getProb, cityStates, map, markers, updateMarkers, checkAlerts, updateClock, setIntervals)

const warStart = new Date(2026, 1, 28);
let cityStates = {};
cities.forEach(c => {
  const key = c.name;
  cityStates[key] = JSON.parse(localStorage.getItem(key)) || { base: c.alerts4, postAlertUntil: 0, noise: 0 };
});

function saveStates() { /* כמו בקוד שלך */ }

// getProb, updateMarkers, checkAlerts, updateClock – בדיוק כמו שהיו

// ====================== אתחול ======================
window.onload = () => {
  updateAlertsFromHistory();                    // עדכון ראשוני
  setInterval(updateAlertsFromHistory, 480000); // כל 8 דקות

  setInterval(checkAlerts, 5000);
  setInterval(() => {
    cities.forEach(c => cityStates[c.name].noise = Math.random()*14 - 7);
    updateMarkers();
  }, 30000);

  checkAlerts();
  updateMarkers();
  updateClock();
  setInterval(updateClock, 1000);
  setTimeout(() => location.reload(), 180000); // רענון כל 3 דקות
};
</script>
</body>
</html>
