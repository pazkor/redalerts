<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>סבירות צבע אדום – מפה</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <style>
    * { box-sizing: border-box; margin:0; padding:0; }
    body { font-family: system-ui, sans-serif; background:#0d1117; color:#e6edf3; direction:rtl; min-height:100vh; display:flex; flex-direction:column; }
    #alert-banner { display:none; background:linear-gradient(135deg,#dc2626,#ef4444); color:white; padding:14px 20px; font-size:clamp(1.1rem,4.5vw,1.6rem); font-weight:bold; text-align:center; box-shadow:0 4px 20px rgba(220,38,38,0.6); position:sticky; top:0; z-index:9999; animation:pulse 2s infinite; }
    @keyframes pulse { 0%,100% {opacity:1;} 50% {opacity:0.9;} }

    #map { flex:1; min-height:300px; }
    .main-content { display:flex; flex:1; flex-direction:column; }
    @media (min-width:900px) { .main-content { flex-direction:row; } #map { flex:2; } #sidebar { flex:1; max-width:340px; padding:16px; background:#111; border-left:2px solid #333; } }

    .container { max-width:1200px; margin:0 auto; padding:12px 16px; }
    h1 { text-align:center; color:#f87171; margin:12px 0; font-size:clamp(1.8rem,6vw,2.4rem); }
    #search { width:100%; padding:12px 16px; font-size:clamp(1rem,4vw,1.25rem); margin:8px 0 16px; border:1px solid #444; border-radius:10px; background:#1f2937; color:white; }

    #prob-box { background:#1f2937; border:1px solid #4b5563; border-radius:12px; padding:20px; text-align:center; margin:16px 0; box-shadow:0 6px 24px rgba(0,0,0,0.4); }
    #percentage { font-size:clamp(4rem,15vw,7rem); font-weight:800; margin:8px 0; line-height:0.9; color:#f3f4f6; }
    #bar { height:36px; background:#374151; border-radius:12px; overflow:hidden; margin:16px 0; }
    #fill { height:100%; background:linear-gradient(90deg,#10b981,#f59e0b,#ef4444); transition:width 0.9s ease-out; }
    #zone-name { font-size:clamp(1.6rem,5vw,2.2rem); margin-bottom:12px; color:#e5e7eb; }
    #explain { font-size:clamp(0.95rem,3.5vw,1.1rem); color:#9ca3af; }

    .stat { margin:12px 0; padding:12px; background:#1a1a1a; border-radius:8px; }
    .stat-label { font-size:0.95rem; color:#aaa; }
    .stat-value { font-size:1.35rem; font-weight:bold; color:#ffcc00; }

    .legend { position:absolute; bottom:16px; right:16px; z-index:1000; background:rgba(31,41,55,0.92); border:1px solid #4b5563; border-radius:10px; padding:10px 14px; font-size:clamp(0.85rem,3vw,0.95rem); box-shadow:0 4px 16px rgba(0,0,0,0.5); max-width:190px; }
    .legend-item { display:flex; align-items:center; margin:6px 0; }
    .legend-color { width:22px; height:22px; border-radius:50%; margin-left:10px; border:2px solid #4b5563; }

    @media (max-width:600px) { .container { padding:8px 12px; } #prob-box { padding:16px; } .legend { bottom:8px; right:8px; padding:8px 12px; max-width:160px; } }
  </style>
</head>
<body>

<div id="alert-banner">
  🚨 <span id="banner-text">התרעות פעילות עכשיו!</span>
  <div id="banner-zones" style="font-size:0.95rem; margin-top:8px;"></div>
</div>

<div class="container">
  <h1>סבירות צבע אדום – מפה</h1>
  <input type="text" id="search" placeholder="חפש עיר או אזור..."/>
</div>

<div class="main-content">
  <div id="map"></div>

  <!-- סטטיסטיקות -->
  <div id="sidebar">
    <div class="stat">
      <div class="stat-label">סה"כ התרעות ב-12 הימים האחרונים</div>
      <div class="stat-value" id="total12">237</div>
    </div>
    <div class="stat">
      <div class="stat-label">שינוי מהשבוע שעבר</div>
      <div class="stat-value" id="trend">+23%</div>
    </div>
    <div class="stat">
      <div class="stat-label">התרעות פעילות כרגע</div>
      <div class="stat-value" id="live-count">0</div>
    </div>
    <div class="stat">
      <div class="stat-label">האזורים הכי פעילים</div>
      <div id="top-zones" style="font-size:0.95rem; line-height:1.4;"></div>
    </div>
  </div>
</div>

<div class="container">
  <div id="prob-box">
    <div id="zone-name">לחץ על בועה במפה או חפש</div>
    <div id="percentage">— %</div>
    <div id="bar"><div id="fill" style="width:0%"></div></div>
    <div id="explain">סבירות משוערת להתרעה **היום** (מבוסס על 12 הימים האחרונים)</div>
  </div>
  <div id="status">טוען מפה...</div>
</div>

<div class="legend">
  <strong>צבע סבירות</strong><br>
  <div class="legend-item"><div class="legend-color" style="background:#10b981"></div> נמוכה (&lt;10%)</div>
  <div class="legend-item"><div class="legend-color" style="background:#f59e0b"></div> בינונית (10–30%)</div>
  <div class="legend-item"><div class="legend-color" style="background:#ef4444"></div> גבוהה (&gt;30%)</div>
</div>

<script>
// ערים + ים המלח
const cities = [
  { name: "תל אביב", lat: 32.0853, lon: 34.7818, alerts12: 9 },
  { name: "ירושלים", lat: 31.7683, lon: 35.2137, alerts12: 3 },
  { name: "חיפה", lat: 32.7940, lon: 34.9896, alerts12: 2 },
  { name: "ראשון לציון", lat: 31.9730, lon: 34.7925, alerts12: 6 },
  { name: "פתח תקווה", lat: 32.0840, lon: 34.8878, alerts12: 7 },
  { name: "אשדוד", lat: 31.8044, lon: 34.6553, alerts12: 5 },
  { name: "נתניה", lat: 32.3215, lon: 34.8532, alerts12: 5 },
  { name: "באר שבע", lat: 31.2520, lon: 34.7915, alerts12: 4 },
  { name: "מודיעין", lat: 31.8939, lon: 35.0150, alerts12: 8 },
  { name: "קריית שמונה", lat: 33.2079, lon: 35.5698, alerts12: 38 },
  { name: "מטולה", lat: 33.2792, lon: 35.5773, alerts12: 26 },
  { name: "שדרות", lat: 31.5293, lon: 34.5965, alerts12: 4 },
  { name: "נהריה", lat: 33.0085, lon: 35.0980, alerts12: 6 },
  { name: "עכו", lat: 32.9278, lon: 35.0780, alerts12: 5 },
  { name: "אילת", lat: 29.5577, lon: 34.9519, alerts12: 0 },
  { name: "ירוחם", lat: 30.9875, lon: 34.9281, alerts12: 1 },
  { name: "ים המלח", lat: 31.35, lon: 35.45, alerts12: 1 }
];

const total12 = cities.reduce((sum, c) => sum + c.alerts12, 0);
document.getElementById('total12').textContent = total12;
document.getElementById('top-zones').innerHTML = cities
  .sort((a,b)=>b.alerts12-a.alerts12)
  .slice(0,4)
  .map(c => `• ${c.name} (${c.alerts12})`).join('<br>');

let selectedMarker = null;

// מפה
const map = L.map('map').setView([31.9, 34.9], 8);
L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
  attribution: '© OpenStreetMap © CARTO',
  maxZoom: 19
}).addTo(map);

L.control.scale({position: 'bottomleft'}).addTo(map);

// בועות
cities.forEach(city => {
  const prob = Math.min(99, Math.round((city.alerts12 / 12) * 100));
  let color = '#10b981';
  if (prob > 30) color = '#ef4444';
  else if (prob > 10) color = '#f59e0b';

  const marker = L.circleMarker([city.lat, city.lon], {
    radius: 11,
    fillColor: color,
    color: '#ffffff',
    weight: 3,
    opacity: 1,
    fillOpacity: 0.88
  }).addTo(map);

  marker.city = city;
  marker.bindTooltip(`<b>${city.name}</b><br>סבירות: ${prob}%`, {permanent: false, direction: 'top'});

  marker.on('click', () => selectCity(city, marker));
});

// חיפוש
document.getElementById('search').addEventListener('input', e => {
  const q = e.target.value.trim().toLowerCase();
  if (!q) return;
  const match = cities.find(c => c.name.toLowerCase().includes(q));
  if (match) {
    selectCity(match, null);
    map.flyTo([match.lat, match.lon], 12);
  }
});

function selectCity(city, marker) {
  document.getElementById('zone-name').textContent = city.name;
  const prob = Math.min(99, Math.round((city.alerts12 / 12) * 100));
  document.getElementById('percentage').textContent = prob + " %";
  document.getElementById('fill').style.width = prob + "%";

  if (selectedMarker) selectedMarker.setStyle({radius: 11, weight: 3});
  if (marker) {
    marker.setStyle({radius: 18, weight: 6});
    selectedMarker = marker;
  }
}

// באנר + סטטיסטיקה חיה
const PROXY = 'https://api.allorigins.win/raw?url=';
const OREF_URL = 'https://www.oref.org.il/WarningMessages/alert/alerts.json';

async function checkAlerts() {
  try {
    const res = await fetch(PROXY + encodeURIComponent(OREF_URL));
    const text = await res.text();
    const data = JSON.parse(text.replace(/^\uFEFF/, ''));

    const banner = document.getElementById('alert-banner');
    const liveCount = document.getElementById('live-count');

    if (Array.isArray(data) && data.length > 0) {
      banner.style.display = 'block';
      document.getElementById('banner-text').textContent = `התרעות פעילות עכשיו (${data.length})`;
      document.getElementById('banner-zones').innerHTML = data.slice(0,10).join(' • ');
      liveCount.textContent = data.length;
      liveCount.style.color = '#ff4444';
    } else {
      banner.style.display = 'none';
      liveCount.textContent = '0';
      liveCount.style.color = '#22c55e';
    }
  } catch(e) {}
}

checkAlerts();
setInterval(checkAlerts, 5000);
</script>
</body>
</html>
